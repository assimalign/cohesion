name: Cohesion Build
description: Restores, builds, and tests a Cohesion project.

inputs:
  kind:
    description: The top-level folder that contains the project set, such as libraries.
    required: true
  container:
    description: The category folder under the top-level kind folder.
    required: true
  project:
    description: The project folder and assembly name to build.
    required: true

runs:
  using: composite
  steps:
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.x

    - name: Restore build tasks
      shell: pwsh
      run: dotnet restore "./build/Tasks/Assimalign.Cohesion.Build.Tasks.csproj"

    - name: Build build tasks
      shell: pwsh
      run: dotnet build "./build/Tasks/Assimalign.Cohesion.Build.Tasks.csproj" --configuration Release --no-restore

    - name: Restore ${{ inputs.project }}
      shell: pwsh
      run: dotnet restore "./${{ inputs.kind }}/${{ inputs.container }}/${{ inputs.project }}/src/${{ inputs.project }}.csproj"

    - name: Build ${{ inputs.project }}
      shell: pwsh
      run: dotnet build "./${{ inputs.kind }}/${{ inputs.container }}/${{ inputs.project }}/src/${{ inputs.project }}.csproj" --configuration Release --no-restore

    - name: Restore tests for ${{ inputs.project }}
      if: ${{ hashFiles(format('./{0}/{1}/{2}/tests/{2}.Tests.csproj', inputs.kind, inputs.container, inputs.project)) != '' }}
      shell: pwsh
      run: dotnet restore "./${{ inputs.kind }}/${{ inputs.container }}/${{ inputs.project }}/tests/${{ inputs.project }}.Tests.csproj"

    - name: Test ${{ inputs.project }}
      if: ${{ hashFiles(format('./{0}/{1}/{2}/tests/{2}.Tests.csproj', inputs.kind, inputs.container, inputs.project)) != '' }}
      shell: pwsh
      run: dotnet test "./${{ inputs.kind }}/${{ inputs.container }}/${{ inputs.project }}/tests/${{ inputs.project }}.Tests.csproj" --configuration Release --no-restore
