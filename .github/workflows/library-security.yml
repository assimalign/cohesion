name: Security
on:
  push:
    paths:
      - "**/Directory.Build.props" # When the Global Props File Changes
      - "libraries/Security/**"
      - ".github/actions/build/**" # When Shared Build Action Changes
      - ".github/workflows/library-security.yml" # When Pipeline File Changes
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "${{ matrix.projects }} [${{ matrix.os }}]"
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Assimalign.Cohesion.Security.Cryptography is intentionally omitted: it
        # has a pre-existing build break (its source references the generated
        # FilePath value type without referencing the library that defines it).
        # Add it to this matrix once that break is fixed.
        projects: [
            "Assimalign.Cohesion.Security"
          ]
    steps:
      - uses: actions/checkout@v4
        name: "Checkout: ${{ matrix.projects }}"

      - uses: ./.github/actions/build
        name: "Running Build & Tests: ${{ matrix.projects }}"
        with:
          area: 'libraries'
          category: 'Security'
          project: ${{ matrix.projects }}
