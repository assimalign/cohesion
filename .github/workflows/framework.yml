name: Framework

#
# Builds and validates the Cohesion SDK family + the Assimalign.Cohesion.App
# shared framework.
#
# Two stages:
#
#   1. pack (ubuntu) -- runs installer/scripts/Install-Local.ps1 to produce:
#         Assimalign.Cohesion.Sdk.9.0.0.nupkg
#         Assimalign.Cohesion.Sdk.Web.9.0.0.nupkg
#         Assimalign.Cohesion.Sdk.Database.9.0.0.nupkg
#         Assimalign.Cohesion.App.Ref.9.0.0.nupkg
#         Assimalign.Cohesion.App.Runtime.<rid>.9.0.0.nupkg  (one per RID)
#      All packs are managed-only, so a single Linux runner can cross-build
#      every RID. Artifacts are uploaded for use by the next stage and for
#      manual inspection from the Actions UI.
#
#   2. smoke-test (matrix: ubuntu/windows/macos) -- materializes a minimal
#      consumer csproj inline, points its nuget.config at the artifact feed,
#      and runs `dotnet build`. This validates the full resolution chain:
#         <Project Sdk="Assimalign.Cohesion.Sdk/9.0.0">
#            -> NuGet pulls Sdk
#            -> SDK's KnownFrameworkReference auto-includes the App framework
#            -> NuGet pulls App.Ref (targeting pack) and App.Runtime.<rid>
#            -> Compiler sees both Assimalign.Cohesion.App and .Core types
#

on:
  push:
    paths:
      - "sdks/**"
      - "frameworks/**"
      - "build/**"
      - "libraries/Core/**"
      - "nuget.config"
      - "global.json"
      - "installer/scripts/Install-Local.ps1"
      - ".github/workflows/framework.yml"
  pull_request:
    paths:
      - "sdks/**"
      - "frameworks/**"
      - "build/**"
      - "libraries/Core/**"
      - "nuget.config"
      - "global.json"
      - "installer/scripts/Install-Local.ps1"
      - ".github/workflows/framework.yml"
  workflow_dispatch:

# Cancel in-progress runs on the same branch/PR. We're building 7 runtime packs
# + 3 OS smoke tests; back-to-back pushes shouldn't queue.
concurrency:
  group: framework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Pack SDK + framework (all RIDs)
    runs-on: ubuntu-latest
    outputs:
      # Exposed so the smoke-test job can pin its inline csproj's
      # Sdk="Assimalign.Cohesion.Sdk/<ver>" to the same version we just packed,
      # without needing to checkout source or duplicate the read of Version.props.
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read CohesionVersion from Version.props
        id: read-version
        shell: pwsh
        run: |
          [xml]$v = Get-Content build/Targets/Version.props
          $ver = $v.Project.PropertyGroup.CohesionVersion.Trim()
          if (-not $ver) { throw "Could not read CohesionVersion from Version.props" }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "CohesionVersion = $ver"

      - name: Pack everything
        shell: pwsh
        # All RIDs declared on KnownFrameworkReference's RuntimePackRuntimeIdentifiers
        # in sdks/Assimalign.Cohesion.Sdk/Targets/Assimalign.Cohesion.Sdk.FrameworkReference.props.
        # Keep this list in sync with that file.
        run: |
          ./installer/scripts/Install-Local.ps1 `
              -Configuration Release `
              -Rids win-x64,win-arm64,linux-x64,linux-arm64,linux-musl-x64,osx-x64,osx-arm64

      - name: Upload .nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cohesion-packages
          path: _out/packages/*.nupkg
          if-no-files-found: error
          retention-days: 14

  smoke-test:
    name: "Smoke test [${{ matrix.os }}]"
    needs: pack
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Explicit RID per OS rather than relying on $(RuntimeIdentifier) defaults.
      # macos-latest moved to ARM-based runners (osx-arm64); a stale default of
      # osx-x64 would resolve the wrong runtime pack and fail.
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: cohesion-packages
          path: packages

      - name: Materialize smoke-test consumer
        shell: pwsh
        env:
          COHESION_VERSION: ${{ needs.pack.outputs.version }}
        # Inline self-contained consumer: nuget.config points at the artifact
        # feed, csproj references the SDK by the version we just packed, and
        # Program.cs touches a type from Assimalign.Cohesion.Core to prove the
        # targeting pack surfaces it (not just App.dll).
        run: |
          New-Item -ItemType Directory -Path SmokeTest -Force | Out-Null
          $feedPath = (Resolve-Path packages).Path
          $version = $env:COHESION_VERSION

          @"
          <?xml version=`"1.0`" encoding=`"utf-8`"?>
          <configuration>
            <packageSources>
              <clear />
              <add key=`"cohesion-local`" value=`"$feedPath`" />
              <add key=`"nuget.org`" value=`"https://api.nuget.org/v3/index.json`" protocolVersion=`"3`" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key=`"cohesion-local`">
                <package pattern=`"Assimalign.Cohesion.*`" />
              </packageSource>
              <packageSource key=`"nuget.org`">
                <package pattern=`"*`" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          "@ | Set-Content -Encoding utf8 SmokeTest/nuget.config

          @"
          <Project Sdk=`"Assimalign.Cohesion.Sdk/$version`">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
              <EnablePreviewFeatures>true</EnablePreviewFeatures>
            </PropertyGroup>
          </Project>
          "@ | Set-Content -Encoding utf8 SmokeTest/SmokeTest.csproj

          @"
          using Assimalign.Cohesion;

          // Type bind proves Core.dll is in the targeting pack; App.dll alone
          // wouldn't expose AppEnvironment.
          Console.WriteLine(`$"Core type resolved: {typeof(AppEnvironment).FullName}");
          "@ | Set-Content -Encoding utf8 SmokeTest/Program.cs

      - name: Build smoke test (validates targeting pack)
        shell: pwsh
        working-directory: SmokeTest
        run: dotnet build --configuration Release --nologo

      - name: Publish self-contained for ${{ matrix.rid }} (validates runtime pack)
        shell: pwsh
        working-directory: SmokeTest
        # Self-contained publish is what pulls Assimalign.Cohesion.App.Runtime.<rid>
        # and copies its DLLs into the publish output. Framework-dependent run
        # (dotnet run) would fail here because the App framework isn't installed
        # in <DOTNET_ROOT>/shared/, only in the NuGet cache.
        run: dotnet publish --configuration Release --runtime ${{ matrix.rid }} --self-contained --nologo

      - name: Run published smoke test
        shell: pwsh
        working-directory: SmokeTest
        # Cross-platform: the apphost extension is .exe on Windows, none on
        # Linux/macOS. Probe via $IsWindows rather than hardcoding.
        run: |
          $publishDir = "bin/Release/net10.0/${{ matrix.rid }}/publish"
          $apphost = if ($IsWindows) { "$publishDir/SmokeTest.exe" } else { "$publishDir/SmokeTest" }
          if (-not (Test-Path -LiteralPath $apphost)) {
              throw "Apphost not found at '$apphost'. Publish step must run first."
          }
          & $apphost
          if ($LASTEXITCODE -ne 0) { throw "Smoke test exited $LASTEXITCODE" }
