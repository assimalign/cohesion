name: Framework

#
# Builds and validates the Cohesion SDK family + the Assimalign.Cohesion.App
# shared framework.
#
# Two stages:
#
#   1. pack (ubuntu) -- runs installer/scripts/Install-Local.ps1 to produce:
#         Assimalign.Cohesion.Sdk.9.0.0.nupkg
#         Assimalign.Cohesion.Sdk.Web.9.0.0.nupkg
#         Assimalign.Cohesion.Sdk.Database.9.0.0.nupkg
#         Assimalign.Cohesion.App.Ref.9.0.0.nupkg
#         Assimalign.Cohesion.App.Runtime.<rid>.9.0.0.nupkg  (one per RID)
#      All packs are managed-only, so a single Linux runner can cross-build
#      every RID. Artifacts are uploaded for use by the next stage and for
#      manual inspection from the Actions UI.
#
#   2. smoke-test (matrix: ubuntu/windows/macos) -- materializes a minimal
#      consumer csproj inline, points its nuget.config at the artifact feed,
#      and runs `dotnet build`. This validates the full resolution chain:
#         <Project Sdk="Assimalign.Cohesion.Sdk/9.0.0">
#            -> NuGet pulls Sdk
#            -> SDK's KnownFrameworkReference auto-includes the App framework
#            -> NuGet pulls App.Ref (targeting pack) and App.Runtime.<rid>
#            -> Compiler sees both Assimalign.Cohesion.App and .Core types
#

on:
  push:
    paths:
      - "sdks/**"
      - "frameworks/**"
      - "build/**"
      - "libraries/Core/**"
      - "nuget.config"
      - "global.json"
      - "installer/scripts/Install-Local.ps1"
      - ".github/workflows/framework.yml"
  pull_request:
    paths:
      - "sdks/**"
      - "frameworks/**"
      - "build/**"
      - "libraries/Core/**"
      - "nuget.config"
      - "global.json"
      - "installer/scripts/Install-Local.ps1"
      - ".github/workflows/framework.yml"
  workflow_dispatch:

# Cancel in-progress runs on the same branch/PR. We're building 7 runtime packs
# + 3 OS smoke tests; back-to-back pushes shouldn't queue.
concurrency:
  group: framework-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions. The publish job below pushes .nupkgs to GitHub
# Packages via the built-in GITHUB_TOKEN, which needs write:packages.
permissions:
  contents: read
  packages: write

jobs:
  pack:
    name: Pack SDK + framework (all RIDs)
    runs-on: ubuntu-latest
    outputs:
      # Exposed so the smoke-test job can pin its inline csproj's
      # Sdk="Assimalign.Cohesion.Sdk/<ver>" to the same version we just packed,
      # without needing to checkout source or duplicate the read of Version.props.
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read CohesionVersion from Version.props
        id: read-version
        shell: pwsh
        run: |
          [xml]$v = Get-Content build/Targets/Version.props
          $ver = $v.Project.PropertyGroup.CohesionVersion.Trim()
          if (-not $ver) { throw "Could not read CohesionVersion from Version.props" }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "CohesionVersion = $ver"

      - name: Pack everything
        shell: pwsh
        # All RIDs declared on KnownFrameworkReference's RuntimePackRuntimeIdentifiers
        # in sdks/Assimalign.Cohesion.Sdk/Targets/Assimalign.Cohesion.Sdk.FrameworkReference.props.
        # Keep this list in sync with that file.
        run: |
          ./installer/scripts/Install-Local.ps1 `
              -Configuration Release `
              -Rids win-x64,win-arm64,linux-x64,linux-arm64,linux-musl-x64,osx-x64,osx-arm64

      - name: Upload .nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cohesion-packages
          path: _out/packages/*.nupkg
          if-no-files-found: error
          retention-days: 14

  smoke-test:
    name: "Smoke test [${{ matrix.os }}]"
    needs: pack
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Explicit RID per OS rather than relying on $(RuntimeIdentifier) defaults.
      # macos-latest moved to ARM-based runners (osx-arm64); a stale default of
      # osx-x64 would resolve the wrong runtime pack and fail.
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: cohesion-packages
          path: packages

      - name: Materialize smoke-test consumers (one per SDK profile)
        shell: pwsh
        env:
          COHESION_VERSION: ${{ needs.pack.outputs.version }}
        # Three inline consumer csprojs, one per SDK profile. Each references
        # a Core type to prove the App framework reference resolves through
        # whichever chained SDK it's using:
        #
        #   SmokeTest.App      -> Sdk          -> App
        #   SmokeTest.Web      -> Sdk.Web      -> App + App.Web
        #   SmokeTest.Database -> Sdk.Database -> App + App.Database
        #
        # All three share one nuget.config that points at the artifact feed.
        run: |
          $feedPath = (Resolve-Path packages).Path
          $version = $env:COHESION_VERSION

          $nugetConfig = @"
          <?xml version=`"1.0`" encoding=`"utf-8`"?>
          <configuration>
            <packageSources>
              <clear />
              <add key=`"cohesion-local`" value=`"$feedPath`" />
              <add key=`"nuget.org`" value=`"https://api.nuget.org/v3/index.json`" protocolVersion=`"3`" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key=`"cohesion-local`">
                <package pattern=`"Assimalign.Cohesion.*`" />
              </packageSource>
              <packageSource key=`"nuget.org`">
                <package pattern=`"*`" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          "@

          $program = @"
          using Assimalign.Cohesion;
          Console.WriteLine(`$"Core type resolved: {typeof(AppEnvironment).FullName}");
          "@

          # global.json pins all three Cohesion SDKs. Sdk.Web and Sdk.Database
          # both chain to Assimalign.Cohesion.Sdk via <Import Sdk="..."> which
          # doesn't honor inline-version syntax - the base SDK has to be
          # pinned here for the chain to resolve.
          $globalJson = @"
          {
              "msbuild-sdks": {
                  "Assimalign.Cohesion.Sdk":          "$version",
                  "Assimalign.Cohesion.Sdk.Web":      "$version",
                  "Assimalign.Cohesion.Sdk.Database": "$version"
              }
          }
          "@

          $profiles = @(
              @{ Dir='SmokeTest.App';      Sdk='Assimalign.Cohesion.Sdk' },
              @{ Dir='SmokeTest.Web';      Sdk='Assimalign.Cohesion.Sdk.Web' },
              @{ Dir='SmokeTest.Database'; Sdk='Assimalign.Cohesion.Sdk.Database' }
          )

          foreach ($p in $profiles) {
              New-Item -ItemType Directory -Path $p.Dir -Force | Out-Null
              $nugetConfig | Set-Content -Encoding utf8 "$($p.Dir)/nuget.config"
              $globalJson  | Set-Content -Encoding utf8 "$($p.Dir)/global.json"
              $program     | Set-Content -Encoding utf8 "$($p.Dir)/Program.cs"

              $csproj = @"
          <Project Sdk=`"$($p.Sdk)`">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
              <EnablePreviewFeatures>true</EnablePreviewFeatures>
            </PropertyGroup>
          </Project>
          "@
              $csproj | Set-Content -Encoding utf8 "$($p.Dir)/$($p.Dir).csproj"
          }

      - name: Build smoke tests (validates targeting packs)
        shell: pwsh
        run: |
          foreach ($dir in 'SmokeTest.App','SmokeTest.Web','SmokeTest.Database') {
              Write-Host "::group::$dir build"
              Push-Location $dir
              try {
                  dotnet build --configuration Release --nologo
                  if ($LASTEXITCODE -ne 0) { throw "$dir build failed" }
              } finally { Pop-Location }
              Write-Host "::endgroup::"
          }

      - name: Publish self-contained for ${{ matrix.rid }} (validates runtime packs)
        shell: pwsh
        # Self-contained publish pulls each framework's Runtime pack for the
        # current RID. If any of the three runtime packs is missing or has a
        # bad RuntimeList.xml, this step fails for that SDK profile.
        run: |
          foreach ($dir in 'SmokeTest.App','SmokeTest.Web','SmokeTest.Database') {
              Write-Host "::group::$dir publish"
              Push-Location $dir
              try {
                  dotnet publish --configuration Release --runtime ${{ matrix.rid }} --self-contained --nologo
                  if ($LASTEXITCODE -ne 0) { throw "$dir publish failed" }
              } finally { Pop-Location }
              Write-Host "::endgroup::"
          }

      - name: Run published smoke tests
        shell: pwsh
        # Cross-platform: apphost extension is .exe on Windows, none elsewhere.
        run: |
          foreach ($dir in 'SmokeTest.App','SmokeTest.Web','SmokeTest.Database') {
              $publishDir = "$dir/bin/Release/net10.0/${{ matrix.rid }}/publish"
              $apphost = if ($IsWindows) { "$publishDir/$dir.exe" } else { "$publishDir/$dir" }
              if (-not (Test-Path -LiteralPath $apphost)) {
                  throw "Apphost not found at '$apphost'."
              }
              Write-Host "::group::$dir run"
              & $apphost
              if ($LASTEXITCODE -ne 0) { throw "$dir smoke test exited $LASTEXITCODE" }
              Write-Host "::endgroup::"
          }

  publish:
    # Pushes every .nupkg produced by the pack job to GitHub Packages.
    # Gated on: branch == main AND both upstream jobs succeeded. Runs on
    # Linux only -- the same artifact gets pushed once, not per-OS.
    #
    # The GitHub feed is QA/UAT staging: every main push REPLACES the
    # previous publish at the same version. The shared helper script
    # deletes the existing version before pushing the fresh copy.
    name: Publish to GitHub Packages
    if: github.ref == 'refs/heads/main'
    needs: [pack, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for .github/scripts/Publish-Nupkg.ps1)
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: cohesion-packages
          path: packages

      - name: Push to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $nupkgs = @(Get-ChildItem -Path packages -Filter '*.nupkg')
          if ($nupkgs.Count -eq 0) { throw "No .nupkg files in artifact." }
          Write-Host "Publishing $($nupkgs.Count) .nupkg file(s) (delete-then-push)..."
          foreach ($nupkg in $nupkgs) {
              ./.github/scripts/Publish-Nupkg.ps1 -NupkgPath $nupkg.FullName
          }
