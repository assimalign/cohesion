name: NAT Gateway
on:
  push:
    paths:
      - "**/Directory.Build.props" # When the Global Props File Changes
      - "resources/NatGateway/**"
      - ".github/workflows/resource-nat-gateway.yml" # When Pipeline File Changes

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        projects: ["Assimalign.Cohesion.NatGateway"]
    steps:
      - uses: actions/checkout@v4
        name: "Checkout: ${{ matrix.projects }}"

      - uses: ./.github/actions/build
        name: "Running Build & Tests: ${{ matrix.projects }}"
        with:
          area: "resources"
          category: "NatGateway"
          project: ${{ matrix.projects }}
