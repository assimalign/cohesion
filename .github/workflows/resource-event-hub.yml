name: EventHub
on:
  push:
    paths:
      - 'resources/EventHub/**'
      - '.github/workflows/resource-event-hub.yml'        # When Pipeline File Changes

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        projects: [
            'Assimalign.Cohesion.EventHub'
        ]
    steps:
      - uses: actions/checkout@v4
        name: "Checkout: ${{ matrix.projects }}"

      - uses: ./.github/actions/build
        name: "Running Build & Tests: ${{ matrix.projects }}"
        with:
          area: 'resources'
          category: 'EventHub'
          project: ${{ matrix.projects }}
