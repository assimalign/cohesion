name: Feature (WBS)
description: A feature under an area epic. Prefer New-CohesionWorkItem.ps1, which computes the WBS code and links the sub-issue automatically.
title: "[L01.01.NN.MM] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        **Prefer the script** (`New-CohesionWorkItem.ps1 -As feature ...`) so the WBS code, the
        native sub-issue link, and the Project #13 fields (Kind=Feature, Area, Origin, Status) are
        set for you. Use this form only as a fallback — then replace `NN.MM` in the title with the
        next free code, set the parent area epic, and set the Project fields manually.
  - type: input
    id: parent
    attributes:
      label: Parent area epic
      description: The area epic this feature belongs under.
      placeholder: "#314 [L01.01.11] Foundation - Http"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What and why (one or two sentences).
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - <observable, testable outcome>
        - Tests cover the new behavior.
        - The implementation remains NativeAOT-safe and trimming-safe.
    validations:
      required: true
  - type: textarea
    id: standards
    attributes:
      label: Standards and Compliance
      value: |
        - Follows the repo coding rules in `.claude/rules/` (interface-first, file-scoped namespaces, area-scoped exceptions).
    validations:
      required: false
